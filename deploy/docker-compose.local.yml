# Standalone localhost stack — HTTP only, no ACME, frontend on :80 via Caddy.
# Usage: docker compose -f docker-compose.local.yml up -d

services:
  backend:
    image: ghcr.io/get-convex/convex-backend@sha256:edd7959f3464ed661f6663f646db205d5d61bda606c969b074dfb3c69ed71463
    stop_grace_period: 10s
    stop_signal: SIGINT
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME}
      - INSTANCE_SECRET=${INSTANCE_SECRET}
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN}
      - CONVEX_SITE_ORIGIN=http://backend:3211
      - POSTGRES_URL=${POSTGRES_URL:-}
      - DISABLE_BEACON=true
      - REDACT_LOGS_TO_CLIENT=${REDACT_LOGS_TO_CLIENT:-false}
    volumes:
      - data:/convex/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 10s
      start_period: 20s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:3210:3210"
      - "127.0.0.1:3211:3211"

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard@sha256:bbc4d2c43d19fd6f2791dd6c5153a76e127f3eea489c1639e5acf66999c216bf
    ports:
      - "127.0.0.1:6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=${CONVEX_CLOUD_ORIGIN}
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      - SITE_ORIGIN=${SITE_ORIGIN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      start_period: 15s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy

  proxy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro,z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  data: {}
  caddy_data: {}
  caddy_config: {}
